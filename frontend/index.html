<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日の記念日 × 猫イラスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Kiwi Maru', serif; }

    @keyframes pawBounce {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50%       { transform: translateY(-10px); opacity: 0.5; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .paw1 { animation: pawBounce 1.2s ease-in-out infinite; }
    .paw2 { animation: pawBounce 1.2s ease-in-out 0.2s infinite; }
    .paw3 { animation: pawBounce 1.2s ease-in-out 0.4s infinite; }
    .fade-in { animation: fadeSlideIn 0.5s ease forwards; }
    .spin-slow { animation: spinSlow 3s linear infinite; }

    .skeleton {
      background: linear-gradient(90deg, #fce7f3 25%, #fbcfe8 50%, #fce7f3 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f472b6, #fb7185);
      transition: all 0.2s;
    }
    .btn-primary:hover  { background: linear-gradient(135deg, #ec4899, #f43f5e); box-shadow: 0 4px 12px rgba(244,114,182,0.4); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: #fce7f3;
      color: #be185d;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: #fbcfe8; }
  </style>
</head>

<body class="min-h-screen" style="background: linear-gradient(150deg, #fdf2f8 0%, #fff7ed 60%, #fdf2f8 100%);">

  <div class="max-w-md mx-auto px-4 py-10">

    <!-- ヘッダー -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">🐱</div>
      <h1 class="text-2xl font-medium text-pink-700 leading-snug mb-1">
        今日の記念日<span class="text-rose-400">×</span>猫イラスト
      </h1>
      <p class="text-sm text-pink-400 mb-4">
        今日の記念日を調べて、水彩画風の猫を生成します
      </p>
      <div class="inline-block bg-white border border-pink-200 text-pink-600 px-5 py-2 rounded-full text-sm shadow-sm">
        📅 <span id="today-date">読み込み中...</span>
      </div>
    </div>

    <!-- ======================================================
         STEP 1: リサーチ
    ====================================================== -->
    <div class="bg-white rounded-3xl shadow-sm border border-pink-100 p-6 mb-4">

      <!-- ステップラベル -->
      <div class="flex items-center gap-2 mb-5">
        <span class="bg-pink-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0">1</span>
        <h2 class="text-base font-medium text-gray-700">今日の記念日をリサーチ</h2>
      </div>

      <!-- 初期ボタン -->
      <div id="r-initial">
        <button onclick="startResearch()"
          class="btn-primary w-full text-white font-medium py-3 px-6 rounded-2xl text-sm">
          🔍 今日の記念日を調べる
        </button>
      </div>

      <!-- ローディング -->
      <div id="r-loading" class="hidden text-center py-4">
        <div class="flex justify-center gap-3 mb-3">
          <span class="paw1 text-2xl">🐾</span>
          <span class="paw2 text-2xl">🐾</span>
          <span class="paw3 text-2xl">🐾</span>
        </div>
        <p class="text-sm text-pink-400">Googleで記念日を検索中です・・・</p>
      </div>

      <!-- 結果 -->
      <div id="r-result" class="hidden fade-in">
        <div class="bg-gradient-to-br from-pink-50 to-rose-50 rounded-2xl p-5 mb-4 border border-pink-100">
          <p class="text-xs text-pink-400 mb-1 tracking-wide">今日のテーマ</p>
          <p class="text-xl font-medium text-pink-700 mb-2" id="r-theme"></p>
          <p class="text-sm text-gray-600 leading-relaxed mb-3" id="r-description"></p>
          <a id="r-url" href="#" target="_blank" rel="noopener noreferrer"
            class="inline-flex items-center gap-1 text-xs text-pink-400 hover:text-pink-600 underline underline-offset-2 break-all">
            📎 <span id="r-url-text"></span>
          </a>
        </div>
        <button onclick="startResearch()"
          class="w-full btn-secondary py-2 px-4 rounded-xl text-sm font-medium">
          🔄 もう一度調べる
        </button>
      </div>

      <!-- エラー -->
      <div id="r-error" class="hidden">
        <div class="bg-red-50 border border-red-100 rounded-2xl p-4 mb-3">
          <p class="text-sm text-red-500" id="r-error-text"></p>
        </div>
        <button onclick="startResearch()"
          class="w-full btn-secondary py-2 px-4 rounded-xl text-sm font-medium">
          🔄 再試行する
        </button>
      </div>
    </div>

    <!-- ======================================================
         STEP 2: 画像生成
    ====================================================== -->
    <div class="bg-white rounded-3xl shadow-sm border border-pink-100 p-6 mb-4">

      <div class="flex items-center gap-2 mb-5">
        <span id="step2-badge"
          class="bg-pink-200 text-pink-500 text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0">2</span>
        <h2 class="text-base font-medium text-gray-700">猫イラストを生成</h2>
      </div>

      <!-- 待機中（リサーチ前） -->
      <div id="g-waiting" class="text-center py-6 text-gray-400">
        <div class="text-4xl mb-2">🐈</div>
        <p class="text-sm">先に記念日を調べてください</p>
      </div>

      <!-- 準備完了 -->
      <div id="g-ready" class="hidden fade-in">
        <div class="bg-pink-50 rounded-2xl p-4 mb-4 text-center">
          <p class="text-sm text-gray-500">「<span id="g-theme-label" class="text-pink-600 font-medium"></span>」をテーマに猫を描きます</p>
        </div>
        <button onclick="startGenerate()"
          class="btn-primary w-full text-white font-medium py-3 px-6 rounded-2xl text-sm">
          🎨 猫イラストを生成する
        </button>
      </div>

      <!-- ローディング -->
      <div id="g-loading" class="hidden text-center py-6">
        <div class="spin-slow text-5xl mb-4 inline-block">🎨</div>
        <p class="text-sm text-pink-500 font-medium">水彩画風の猫を描いています。...</p>
        <p class="text-xs text-gray-400 mt-1">少し時間がかかります（30秒ほど）</p>
      </div>

      <!-- 結果 -->
      <div id="g-result" class="hidden fade-in">
        <div class="mb-4 rounded-2xl overflow-hidden shadow-md">
          <img id="g-image" src="" alt="生成された猫のイラスト" class="w-full">
        </div>
        <div class="bg-pink-50 rounded-xl px-4 py-2 mb-4 text-center">
          <p class="text-xs text-pink-400">
            テーマ: <span id="g-result-label" class="font-medium text-pink-600"></span>
          </p>
        </div>
        <div class="flex gap-2">
          <button onclick="startGenerate()"
            class="flex-1 btn-secondary py-2.5 rounded-xl text-sm font-medium">
            🔄 もう一度生成
          </button>
          <button onclick="downloadImage()"
            class="flex-1 btn-primary text-white py-2.5 rounded-xl text-sm font-medium">
            💾 保存する
          </button>
        </div>
      </div>

      <!-- エラー -->
      <div id="g-error" class="hidden">
        <div class="bg-red-50 border border-red-100 rounded-2xl p-4 mb-3">
          <p class="text-sm text-red-500" id="g-error-text"></p>
        </div>
        <button onclick="startGenerate()"
          class="w-full btn-secondary py-2 px-4 rounded-xl text-sm font-medium">
          🔄 再試行する
        </button>
      </div>
    </div>

    <!-- フッター -->
    <p class="text-center text-xs text-pink-300">
      Powered by Gemini & Pollinations.ai ／ 画像はAIが生成します
    </p>

  </div><!-- /container -->

  <script>
    // ==========================================================
    // 設定: デプロイした Cloudflare Worker の URL
    // ==========================================================
    const WORKER_URL = "https://anniversary-cat-worker.hiroshikuze.workers.dev";

    // ----------------------------------------------------------
    // 状態
    // ----------------------------------------------------------
    let researchData = null;
    let lastImageUrl = null;

    // ----------------------------------------------------------
    // 初期化
    // ----------------------------------------------------------
    (function init() {
      const now = new Date();
      document.getElementById("today-date").textContent =
        now.toLocaleDateString("ja-JP", {
          year: "numeric", month: "long", day: "numeric", weekday: "long",
        });
    })();

    function getApiDate() {
      const d = new Date();
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }

    // ----------------------------------------------------------
    // 指数バックオフ付きフェッチ
    // ----------------------------------------------------------
    async function apiFetch(path, body, maxRetries = 3) {
      const url = WORKER_URL + path;
      const options = {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      };

      for (let attempt = 0; attempt < maxRetries; attempt++) {
        let res;
        try {
          res = await fetch(url, options);
        } catch (networkErr) {
          if (attempt === maxRetries - 1) throw new Error("ネットワークエラー: " + networkErr.message);
          await wait(Math.pow(2, attempt) * 1000 + Math.random() * 500);
          continue;
        }

        const data = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));

        if (res.ok) return data;

        // リトライ対象: レート制限・サーバーエラー
        if ((res.status === 429 || res.status >= 500) && attempt < maxRetries - 1) {
          await wait(Math.pow(2, attempt) * 1000 + Math.random() * 500);
          continue;
        }

        throw new Error(data.error || `エラー (HTTP ${res.status})`);
      }
    }

    function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }

    // ----------------------------------------------------------
    // UI 状態切り替えヘルパー
    // ----------------------------------------------------------
    function showResearch(state) {
      ["initial", "loading", "result", "error"].forEach((s) => {
        document.getElementById("r-" + s).classList.toggle("hidden", s !== state);
      });
    }

    function showGenerate(state) {
      ["waiting", "ready", "loading", "result", "error"].forEach((s) => {
        document.getElementById("g-" + s).classList.toggle("hidden", s !== state);
      });
      // Step2 バッジをアクティブに
      const badge = document.getElementById("step2-badge");
      if (state === "waiting") {
        badge.className = "bg-pink-200 text-pink-400 text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0";
      } else {
        badge.className = "bg-pink-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0";
      }
    }

    // ----------------------------------------------------------
    // STEP 1: リサーチ
    // ----------------------------------------------------------
    async function startResearch() {
      researchData = null;
      lastImageUrl = null;
      showResearch("loading");
      showGenerate("waiting");

      try {
        const data = await apiFetch("/research", { date: getApiDate() });
        researchData = data;

        document.getElementById("r-theme").textContent = data.theme ?? "不明";
        document.getElementById("r-description").textContent = data.description ?? "";

        // 出典 URL
        const urlEl = document.getElementById("r-url");
        const urlTextEl = document.getElementById("r-url-text");
        if (data.sourceUrl) {
          let hostname = data.sourceUrl;
          try { hostname = new URL(data.sourceUrl).hostname; } catch {}
          urlEl.href = data.sourceUrl;
          urlTextEl.textContent = hostname;
          urlEl.style.display = "inline-flex";
        } else {
          urlEl.style.display = "none";
        }

        showResearch("result");

        // Step 2 を準備完了に
        document.getElementById("g-theme-label").textContent = data.theme ?? "";
        showGenerate("ready");

      } catch (err) {
        document.getElementById("r-error-text").textContent = err.message;
        showResearch("error");
      }
    }

    // ----------------------------------------------------------
    // STEP 2: 画像生成
    // ----------------------------------------------------------
    async function startGenerate() {
      if (!researchData) return;
      lastImageUrl = null;
      showGenerate("loading");

      try {
        const data = await apiFetch("/generate", {
          theme: researchData.theme,
          description: researchData.description,
        });

        // Gemini から返ってきた base64 データを data URL に変換して表示
        const dataUrl = `data:${data.mimeType};base64,${data.imageData}`;
        document.getElementById("g-image").src = dataUrl;
        lastImageUrl = dataUrl;
        document.getElementById("g-result-label").textContent = researchData.theme;
        showGenerate("result");

      } catch (err) {
        document.getElementById("g-error-text").textContent = err.message;
        showGenerate("error");
      }
    }

    // ----------------------------------------------------------
    // 画像ダウンロード
    // ----------------------------------------------------------
    async function downloadImage() {
      if (!lastImageUrl) return;
      const a = document.createElement("a");
      a.href = lastImageUrl;
      const safeName = (researchData?.theme ?? "cat").replace(/[\\/:*?"<>|]/g, "_");
      a.download = `anniversary-cat-${safeName}.png`;
      a.click();
    }
  </script>
</body>
</html>
