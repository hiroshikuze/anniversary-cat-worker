<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>にゃんバーサリー</title>
  <meta name="description" content="今日の記念日をAIが調べて、水彩画風の猫イラストを生成します。にゃんバーサリー（Nyaniversary）- Gemini × Pollinations.ai を使った無料Webアプリ。">

  <!-- canonical -->
  <link rel="canonical" href="https://hiroshikuze.github.io/anniversary-cat-worker/">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://hiroshikuze.github.io/anniversary-cat-worker/">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="にゃんバーサリー">
  <meta name="twitter:description" content="今日の記念日をAIが調べて、水彩画風の猫イラストを生成します。">

  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="alternate" type="application/rss+xml" title="にゃんバーサリー" href="https://anniversary-cat-worker.hiroshikuze.workers.dev/rss.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Kiwi Maru', serif; }

    @keyframes pawBounce {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50%       { transform: translateY(-10px); opacity: 0.5; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .paw1 { animation: pawBounce 1.2s ease-in-out infinite; }
    .paw2 { animation: pawBounce 1.2s ease-in-out 0.2s infinite; }
    .paw3 { animation: pawBounce 1.2s ease-in-out 0.4s infinite; }
    .fade-in { animation: fadeSlideIn 0.5s ease forwards; }
    .spin-slow { animation: spinSlow 3s linear infinite; }

    .skeleton {
      background: linear-gradient(90deg, #fce7f3 25%, #fbcfe8 50%, #fce7f3 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f472b6, #fb7185);
      transition: all 0.2s;
    }
    .btn-primary:hover  { background: linear-gradient(135deg, #ec4899, #f43f5e); box-shadow: 0 4px 12px rgba(244,114,182,0.4); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: #fce7f3;
      color: #be185d;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: #fbcfe8; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #be185d;
      color: white;
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(190,24,93,0.3);
      animation: toastIn 0.25s ease forwards;
      z-index: 9999;
      pointer-events: none;
    }
    .btn-disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .lang-toggle {
      display: inline-flex;
      align-items: center;
      background: white;
      border: 1px solid #fbcfe8;
      border-radius: 9999px;
      padding: 4px 12px;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(244,114,182,0.1);
      transition: box-shadow 0.2s;
    }
    .lang-toggle:hover { box-shadow: 0 2px 8px rgba(244,114,182,0.2); }
    .lang-active   { color: #be185d; font-weight: 600; }
    .lang-inactive { color: #f9a8d4; }
    .lang-sep      { color: #fbcfe8; }

    /* What's New ベルボタン */
    .whatsnew-btn {
      position: relative;
      background: white;
      border: 1px solid #fbcfe8;
      border-radius: 9999px;
      padding: 4px 10px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(244,114,182,0.1);
      transition: box-shadow 0.2s;
      line-height: 1;
    }
    .whatsnew-btn:hover { box-shadow: 0 2px 8px rgba(244,114,182,0.2); }
    .whatsnew-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      background: #be185d;
      border-radius: 50%;
      border: 2px solid white;
    }
    #whatsnew-overlay {
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
  </style>
</head>

<body class="min-h-screen" style="background: linear-gradient(150deg, #fdf2f8 0%, #fff7ed 60%, #fdf2f8 100%);">

  <div class="max-w-md mx-auto px-4 py-10">

    <!-- 言語切り替え -->
    <div class="flex justify-between items-center mb-3">
      <button class="whatsnew-btn" onclick="showWhatsNew()" aria-label="アップデート情報 / What's New">
        🔔<span id="whatsnew-badge" class="whatsnew-badge hidden"></span>
      </button>
      <button class="lang-toggle" onclick="toggleLang()" aria-label="言語切り替え / Language toggle">
        <span id="lang-btn-ja" class="lang-active">JP</span>
        <span class="lang-sep">|</span>
        <span id="lang-btn-en" class="lang-inactive">EN</span>
      </button>
    </div>

    <!-- ヘッダー -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">🐱</div>
      <h1 class="text-2xl font-medium text-pink-700 leading-snug mb-1" data-i18n="pageTitle">にゃんバーサリー</h1>
      <p class="text-sm text-pink-400 mb-4" data-i18n="subtitle">
        今日の記念日を調べて、水彩画風の猫を生成します
      </p>
      <div class="inline-block bg-white border border-pink-200 text-pink-600 px-5 py-2 rounded-full text-sm shadow-sm">
        📅 <span id="today-date">読み込み中...</span>
      </div>
    </div>

    <!-- ======================================================
         画像生成（記念日リサーチ → 猫イラスト生成）
    ====================================================== -->
    <div class="bg-white rounded-3xl shadow-sm border border-pink-100 p-6 mb-4">

      <!-- 初期ボタン -->
      <div id="g-waiting">
        <button onclick="startResearch()"
          class="btn-primary w-full text-white font-medium py-3 px-6 rounded-2xl text-sm" data-i18n="researchBtn">
          🔍 今日の記念日を調べる
        </button>
      </div>

      <!-- ローディング -->
      <div id="g-loading" class="hidden text-center py-6">
        <div class="spin-slow text-5xl mb-4 inline-block">🎨</div>
        <p class="text-sm text-pink-500 font-medium" data-i18n="generateLoading">水彩画風の猫を描いています。...</p>
        <p class="text-xs text-gray-400 mt-1" data-i18n="generateTimeEst">少し時間がかかります（30秒ほど）</p>
      </div>

      <!-- 結果 -->
      <div id="g-result" class="hidden fade-in">
        <div class="mb-3 rounded-2xl overflow-hidden shadow-md">
          <img id="g-image" src="" alt="生成された猫のイラスト" class="w-full">
        </div>
        <!-- キャプション（絵の下） -->
        <div class="bg-pink-50 rounded-2xl px-5 py-4 mb-4 text-center">
          <p class="text-base font-medium text-pink-700 mb-1" id="g-result-label"></p>
          <a id="g-result-description" href="#" target="_blank" rel="noopener" class="text-sm text-gray-500 leading-relaxed hover:text-pink-500 underline-offset-2"></a>
        </div>
        <div class="flex gap-2">
          <button onclick="startGenerate()"
            class="flex-1 btn-secondary py-2.5 rounded-xl text-sm font-medium" data-i18n="regenerateBtn">
            🔄 もう一度生成
          </button>
          <button onclick="shareOrSaveImage()"
            class="flex-1 btn-primary text-white py-2.5 rounded-xl text-sm font-medium" data-i18n="saveBtn">
            💾 保存する
          </button>
        </div>

        <!-- グッズを買うセクション（SUZURI商品がある場合のみ表示） -->
        <div id="g-goods" class="hidden mt-4">
          <p class="text-xs text-pink-400 text-center mb-2" data-i18n="goodsLabel">🛍️ グッズを買う（SUZURI）</p>
          <div id="g-goods-list" class="grid grid-cols-2 gap-2"></div>
          <p class="text-xs text-gray-400 text-center mt-2" data-i18n="goodsExpiry">共有リンクとグッズ購入は生成後14日間のみご利用いただけます</p>
        </div>
      </div>

      <!-- エラー -->
      <div id="g-error" class="hidden">
        <div class="bg-red-50 border border-red-100 rounded-2xl p-4 mb-3">
          <p class="text-sm text-red-500" id="g-error-text"></p>
        </div>
        <button onclick="startResearch()"
          class="w-full btn-secondary py-2 px-4 rounded-xl text-sm font-medium" data-i18n="retryBtn">
          🔄 再試行する
        </button>
      </div>

      <!-- 期限切れ -->
      <div id="g-expired" class="hidden">
        <div class="bg-pink-50 border border-pink-100 rounded-2xl p-5 mb-3 text-center">
          <p class="text-4xl mb-2">🐱💤</p>
          <p class="text-sm text-pink-500" data-i18n="expiredText">この記念日画像は期限切れです（14日間保存）</p>
        </div>
        <button onclick="startResearch()"
          class="w-full btn-primary text-white py-2.5 px-4 rounded-xl text-sm font-medium" data-i18n="createNewBtn">
          🎨 今日の記念日で作る
        </button>
      </div>
    </div>

    <!-- ギャラリー -->
    <div id="g-gallery" class="hidden mt-8">
      <div class="flex items-center gap-2 mb-3">
        <h2 class="text-sm font-medium text-pink-500" data-i18n="galleryTitle">最近の作品</h2>
        <a href="https://anniversary-cat-worker.hiroshikuze.workers.dev/rss.xml"
          title="RSS フィード"
          class="text-pink-300 hover:text-pink-500 transition-colors"
          aria-label="RSS フィード">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
          </svg>
        </a>
      </div>
      <div id="g-gallery-list"
        class="flex gap-3 overflow-x-auto pb-2"
        style="-webkit-overflow-scrolling:touch; scroll-snap-type:x mandatory;">
      </div>
    </div>

    <!-- フッター -->
    <p class="text-center text-xs text-pink-300" data-i18n="footer">
      Powered by Gemini &amp; Pollinations.ai ／ 画像はAIが生成します
    </p>

  </div><!-- /container -->

  <!-- What's New モーダル -->
  <div id="whatsnew-overlay"
    class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 hidden"
    onclick="if(event.target===this)closeWhatsNew()">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6"
      style="animation: fadeSlideIn 0.2s ease">
      <div class="flex items-center justify-between mb-4">
        <h2 id="whatsnew-title" class="text-base font-medium text-pink-700">🆕 アップデート情報</h2>
        <button onclick="closeWhatsNew()"
          class="text-pink-300 hover:text-pink-500 transition-colors text-xl leading-none"
          aria-label="閉じる">✕</button>
      </div>
      <ul id="whatsnew-list" class="space-y-3 text-sm text-gray-600"></ul>
      <button onclick="closeWhatsNew()" id="whatsnew-close-btn"
        class="mt-5 w-full btn-primary py-2 rounded-xl text-sm">閉じる</button>
    </div>
  </div>

  <!-- トースト通知（在庫切れ等） -->
  <div id="g-toast" class="toast hidden"></div>

  <script>
    // ==========================================================
    // 設定: デプロイした Cloudflare Worker の URL
    // ==========================================================
    const WORKER_URL = "https://anniversary-cat-worker.hiroshikuze.workers.dev";
    const STORAGE_DAYS = 14;

    // ----------------------------------------------------------
    // What's New
    // ----------------------------------------------------------
    const APP_VERSION = "2026-04-10";
    const CHANGELOG = [
      {
        version: "2026-04-10",
        items: [
          { icon: "🖨️", ja: "Tシャツ・ステッカーのグッズ画像の印刷品質を改善しました", en: "Improved print quality for T-shirt & sticker goods images" },
          { icon: "🐱", ja: "「大仏の日」など末尾が「の日」のテーマで投稿文の重複を修正しました", en: 'Fixed duplicate "の日" in post text for themes ending with "の日"' },
        ],
      },
    ];

    // ----------------------------------------------------------
    // i18n
    // ----------------------------------------------------------
    const translations = {
      ja: {
        pageTitle:          "にゃんバーサリー",
        subtitle:           "今日の記念日を調べて、水彩画風の猫を生成します",
        step1Label:         "今日の記念日をリサーチ",
        researchBtn:        "🔍 今日の記念日を調べる",
        researchLoading:    "Googleで記念日を検索中です・・・",
        todayTheme:         "今日のテーマ",
        researchRetry:      "🔄 もう一度調べる",
        retryBtn:           "🔄 再試行する",
        step2Label:         "猫イラストを生成",
        waitingText:        "先に記念日を調べてください",
        generatePreviewPre: "「",
        generatePreviewPost:"」をテーマに猫を描きます",
        generateBtn:        "🎨 猫イラストを生成する",
        generateLoading:    "水彩画風の猫を描いています。...",
        generateTimeEst:    "少し時間がかかります（30秒ほど）",
        themeLabel:         "テーマ: ",
        regenerateBtn:      "🔄 もう一度生成",
        saveBtn:            "💾 保存する",
        shareBtn:           "🔗 共有する",
        footer:             "Powered by Gemini &amp; Pollinations.ai ／ 画像はAIが生成します<br><a href=\"https://github.com/hiroshikuze/anniversary-cat-worker#readme\" target=\"_blank\" rel=\"noopener\" class=\"underline hover:text-pink-100\">このサービスについて</a>",
        networkError:       "ネットワークエラー: ",
        httpError:          "エラー (HTTP ",
        imageLoadError:     "画像の読み込みに失敗しました。しばらく待ってから再度お試しください。",
        noImageError:       "画像データなし。返却フィールド: ",
        rateLimitError:     "本日の利用上限に達しました。明日またお試しください。",
        goodsLabel:         "🛍️ グッズを買う（SUZURI）",
        goodsExpiry:        `共有リンクとグッズ購入は生成後${STORAGE_DAYS}日間のみご利用いただけます`,
        outOfStockToast:    "この商品は現在在庫切れです",
        preparingToast:     "まもなく準備完了です。しばらくお待ちください",
        preparingBtn:       "準備中…",
        expiredText:        `この記念日画像は期限切れです（${STORAGE_DAYS}日間保存）`,
        createNewBtn:       "🎨 今日の記念日で作る",
        newGenerateBtn:     "✨ 新しく生成",
        dateLocale:         "ja-JP",
        whatsNewTitle:      "🆕 アップデート情報",
        whatsNewClose:      "閉じる",
        galleryTitle:       "最近の作品",
      },
      en: {
        pageTitle:          "Nyaniversary",
        subtitle:           "Find today's anniversary and generate a watercolor-style cat",
        step1Label:         "Research Today's Anniversary",
        researchBtn:        "🔍 Find Today's Anniversary",
        researchLoading:    "Searching for anniversaries on Google...",
        todayTheme:         "Today's Theme",
        researchRetry:      "🔄 Try Again",
        retryBtn:           "🔄 Retry",
        step2Label:         "Generate Cat Illustration",
        waitingText:        "Please research the anniversary first",
        generatePreviewPre: "Drawing a cat with theme \u201c",
        generatePreviewPost:"\u201d",
        generateBtn:        "🎨 Generate Cat Illustration",
        generateLoading:    "Drawing a watercolor-style cat...",
        generateTimeEst:    "This may take a moment (~30 seconds)",
        themeLabel:         "Theme: ",
        regenerateBtn:      "🔄 Generate Again",
        saveBtn:            "💾 Save",
        shareBtn:           "🔗 Share",
        footer:             "Powered by Gemini &amp; Pollinations.ai / Images are AI-generated<br><a href=\"https://github.com/hiroshikuze/anniversary-cat-worker#readme\" target=\"_blank\" rel=\"noopener\" class=\"underline hover:text-pink-100\">About this service</a>",
        networkError:       "Network error: ",
        httpError:          "Error (HTTP ",
        imageLoadError:     "Failed to load the image. Please try again later.",
        noImageError:       "No image data. Returned fields: ",
        rateLimitError:     "You have reached today's usage limit. Please try again tomorrow.",
        goodsLabel:         "🛍️ Buy Goods (SUZURI)",
        goodsExpiry:        `Sharing links and goods are available for ${STORAGE_DAYS} days after generation`,
        outOfStockToast:    "This item is currently out of stock",
        preparingToast:     "Almost ready. Please wait a moment.",
        preparingBtn:       "Preparing…",
        expiredText:        `This anniversary image has expired (stored for ${STORAGE_DAYS} days)`,
        createNewBtn:       "🎨 Create Today's Anniversary",
        newGenerateBtn:     "✨ Generate New",
        dateLocale:         "en-US",
        whatsNewTitle:      "🆕 What's New",
        whatsNewClose:      "Close",
        galleryTitle:       "Recent Works",
      },
    };

    let currentLang = "ja";

    function t(key) {
      return translations[currentLang][key] ?? translations.ja[key] ?? key;
    }

    function applyLang() {
      document.documentElement.lang = currentLang;
      document.title = t("pageTitle");

      // テキストノードを更新
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (key === "footer") {
          el.innerHTML = t(key);
        } else {
          el.textContent = t(key);
        }
      });

      // 言語トグルボタンの見た目
      document.getElementById("lang-btn-ja").className = currentLang === "ja" ? "lang-active" : "lang-inactive";
      document.getElementById("lang-btn-en").className = currentLang === "en" ? "lang-active" : "lang-inactive";

      // 日付表示を更新
      updateDateDisplay();
    }

    function toggleLang() {
      currentLang = currentLang === "ja" ? "en" : "ja";
      applyLang();
      // 動的生成されたグッズボタンはdata-i18n外なので言語切り替え時に再描画
      if (lastProducts) showGoods(lastProducts);
      // 共有ビュー中のresultボタンも再描画
      if (isSharedView && !document.getElementById("g-result").classList.contains("hidden")) {
        updateResultButtons();
      }
    }

    // ----------------------------------------------------------
    // What's New モーダル
    // ----------------------------------------------------------
    function showWhatsNew() {
      document.getElementById("whatsnew-title").textContent = t("whatsNewTitle");
      document.getElementById("whatsnew-close-btn").textContent = t("whatsNewClose");
      const list = document.getElementById("whatsnew-list");
      list.innerHTML = "";
      CHANGELOG.forEach((entry) => {
        entry.items.forEach((item) => {
          const li = document.createElement("li");
          li.className = "flex gap-2";
          li.innerHTML = `<span>${item.icon}</span><span>${currentLang === "en" ? item.en : item.ja}</span>`;
          list.appendChild(li);
        });
      });
      document.getElementById("whatsnew-badge").classList.add("hidden");
      localStorage.setItem("whatsNewSeen", APP_VERSION);
      document.getElementById("whatsnew-overlay").classList.remove("hidden");
    }

    function closeWhatsNew() {
      document.getElementById("whatsnew-overlay").classList.add("hidden");
    }

    function initWhatsNew() {
      const seen = localStorage.getItem("whatsNewSeen");
      if (seen !== APP_VERSION) {
        document.getElementById("whatsnew-badge").classList.remove("hidden");
        showWhatsNew();
      }
    }

    // ----------------------------------------------------------
    // クライアントサイドのレート制限キャッシュ
    // ----------------------------------------------------------
    function isRateLimited() {
      const today = new Date().toISOString().slice(0, 10);
      return localStorage.getItem("generateRateLimitDate") === today;
    }

    function setRateLimited(message) {
      const today = new Date().toISOString().slice(0, 10);
      localStorage.setItem("generateRateLimitDate", today);
      if (message) localStorage.setItem("generateRateLimitMsg", message);
    }

    function getRateLimitMessage() {
      return localStorage.getItem("generateRateLimitMsg") || t("rateLimitError");
    }

    // ----------------------------------------------------------
    // 状態
    // ----------------------------------------------------------
    let researchData    = null;
    let lastImageUrl    = null;
    let isSharedView    = false;   // 共有URLから遷移した場合true
    let lastProducts    = null;    // 言語切り替え時のgoods再描画用
    let currentSharedId = null;    // 現在表示中のr2Id（共有URL生成に使用）

    // ----------------------------------------------------------
    // 初期化
    // ----------------------------------------------------------
    function updateDateDisplay() {
      const now = new Date();
      const locale = t("dateLocale");
      document.getElementById("today-date").textContent =
        now.toLocaleDateString(locale, {
          year: "numeric", month: "long", day: "numeric", weekday: "long",

    // ----------------------------------------------------------
    // 指数バックオフ付きフェッチ
    // ----------------------------------------------------------
    async function apiFetch(path, body, maxRetries = 3) {
      const url = WORKER_URL + path;
      const headers = { "Content-Type": "application/json" };
      const bypassToken = localStorage.getItem("bypassToken");
      if (bypassToken) headers["X-Bypass-Token"] = bypassToken;
      const options = {
        method: "POST",
        headers,
        body: JSON.stringify(body),
      };

      for (let attempt = 0; attempt < maxRetries; attempt++) {
        let res;
        try {
          res = await fetch(url, options);
        } catch (networkErr) {
          if (attempt === maxRetries - 1) throw new Error(t("networkError") + networkErr.message);
          await wait(Math.pow(2, attempt) * 1000 + Math.random() * 500);
          continue;
        }

        const data = await res.json().catch(() => ({ error: `${t("httpError")}${res.status})` }));

        if (res.ok) return data;

        // 429（レート制限）はリトライしない
        if (res.status === 429) {
          const msg = data.error || `${t("httpError")}429)`;
          if (path === "/generate") setRateLimited(msg);
          throw new Error(msg);
        }

        // リトライ対象: サーバーエラー
        if (res.status >= 500 && attempt < maxRetries - 1) {
          await wait(Math.pow(2, attempt) * 1000 + Math.random() * 500);
          continue;
        }

        throw new Error(data.error || `${t("httpError")}${res.status})`);
      }
    }

    function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }

    // ----------------------------------------------------------
    // SUZURI バックグラウンド登録ポーリング
    // ----------------------------------------------------------
    function startPollingSuzuri(r2Id, slugsToWatch) {
      const INTERVAL_MS  = 5_000;
      const MAX_ATTEMPTS = 12; // 60秒
      let attempts = 0;
      let lastMeta = null;

      const poll = async () => {
        attempts++;
        try {
          const res = await fetch(`${WORKER_URL}/meta/${r2Id}`);
          if (res.ok) {
            lastMeta = await res.json();
            const found = (lastMeta.products ?? []).filter(p => slugsToWatch.includes(p.slug));
            if (found.length >= slugsToWatch.length) {
              // 完了: lastProducts の該当スラッグを置き換えて再描画
              const updated = (lastProducts ?? []).map(p => {
                const match = found.find(f => f.slug === p.slug);
                return match ?? p;
              });
              showGoods(updated);
              return;
            }
          }
        } catch (e) {
          console.warn("[poll] エラー:", e.message);
        }
        if (attempts < MAX_ATTEMPTS) {
          setTimeout(poll, INTERVAL_MS);
          return;
        }
        // 60秒タイムアウト: falRequestId があれば resume-hires で最終試行
        if (lastMeta?.falRequestId) {
          await resumeHires(r2Id, lastMeta, slugsToWatch);
        }
      };

      setTimeout(poll, INTERVAL_MS);
    }

    // ポーリングタイムアウト後の最終試行: /resume-hires で SUZURI 登録を完了させる
    async function resumeHires(r2Id, meta, slugsToWatch) {
      console.log("[resume-hires] 最終試行開始");
      try {
        const res = await fetch(`${WORKER_URL}/resume-hires/${r2Id}`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.stillProcessing) {
          console.log("[resume-hires] まだ処理中 → あきらめ");
          return;
        }
        if (data.products?.length > 0) {
          const found = data.products.filter(p => slugsToWatch.includes(p.slug));
          if (found.length > 0) {
            const updated = (lastProducts ?? []).map(p => {
              const match = found.find(f => f.slug === p.slug);
              return match ?? p;
            });
            showGoods(updated);
          }
        }
      } catch (e) {
        console.warn("[resume-hires] エラー:", e.message);
      }
    }

      return jst.toISOString().slice(0, 10); // YYYY-MM-DD
    }

    async function loadGallery() {
      const list = document.getElementById("g-gallery-list");
      if (!list) return;

      const today = new Date();
      const candidates = [];
      for (let i = 0; i < GALLERY_DAYS; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        candidates.push(`bot/${toJSTDateString(d)}`);
      }

      // /meta/:id を並列fetch（軽量）
      const results = await Promise.all(
        candidates.map(id =>
          fetch(`${WORKER_URL}/meta/${id}`)
            .then(r => r.ok ? r.json().then(meta => ({ id, meta })) : null)
            .catch(() => null)
        )
      );

      const valid = results.filter(Boolean);
      if (valid.length === 0) return;

      document.getElementById("g-gallery").classList.remove("hidden");

      for (const { id, meta } of valid) {
        const card = buildGalleryCard(id, meta);
        list.appendChild(card);

        if (!(meta.products?.length > 0)) {
          registerGalleryItemInBackground(id, meta);

        const data = await res.json();

    // ----------------------------------------------------------
    // SUZURI 商品登録（手動生成・ボット共有URLの初回訪問者の両方で使用）
    // best-effort: 失敗しても画像表示は維持する
    // ----------------------------------------------------------
    function createSuzuriFromImage(imageData, mimeType, theme, r2Id) {
      Promise.all([
        applyWatermark(imageData, mimeType, "bottom-right"),
        applyWatermark(imageData, mimeType, "bottom-center"),
      ]).then(([rightWm, centerWm]) =>
        // t-shirt/sticker グループのみ fal.ai 失敗時フォールバック用に 2048px へ事前リサイズ
        // （fal.ai 投入は 1024px のまま維持。2048px 投入 → ESRGAN 4096px → SUZURI 20MB超過のため）
        resizeForSuzuri(rightWm.imageData, rightWm.mimeType)
          .then(rightHires => Promise.allSettled([
            apiFetch("/suzuri-create", {
              imageData:      rightWm.imageData,
              hiresImageData: rightHires.imageData,
              mimeType:       rightWm.mimeType,
              theme,
              r2Id,
              slugs: RIGHT_SLUGS,
            }),
            apiFetch("/suzuri-create", {
              imageData: centerWm.imageData,
              mimeType:  centerWm.mimeType,
              theme,
              r2Id,
              slugs: CENTER_SLUGS,
            }),
          ]))
      ).then(([rightRes, centerRes]) => {
        const centerProducts = centerRes.status === "fulfilled"
          ? centerRes.value?.products ?? [] : [];
        const rightQueued = rightRes.status === "fulfilled" && rightRes.value?.queued === true;
        const rightProducts = rightRes.status === "fulfilled" && !rightQueued
          ? rightRes.value?.products ?? []
          : RIGHT_SLUGS.map(slug => ({ slug, sampleUrl: null, available: false, queued: rightQueued }));
        const allProducts = [...rightProducts, ...centerProducts];
        if (allProducts.length > 0) showGoods(allProducts);
        if (rightQueued && r2Id) {
          startPollingSuzuri(r2Id, RIGHT_SLUGS);
        }
      }).catch(e => {
        console.warn("[suzuri-create] 失敗:", e.message);
      });
    }

    // ----------------------------------------------------------
    // Canvas ウォーターマーク合成（© nyanmusu を描画）
    // ----------------------------------------------------------
    // 座標計算のみを行う純粋関数（テスト用にwindow経由でエクスポート）
    // position: 'bottom-right'（矩形商品）または 'bottom-center'（円形・変形商品）
    function _calcWatermarkLayout(imgWidth, imgHeight, textWidth, position = "bottom-right") {
      const fontSize = Math.max(12, Math.round(imgWidth * 0.013));
      const padX = 8, padY = 5, margin = 12;
      const bgW  = textWidth + padX * 2;
      const bgH  = fontSize  + padY * 2;
      const bgX  = position === "bottom-center"
        ? Math.round((imgWidth - bgW) / 2)
        : imgWidth - bgW - margin;
      const bgY  = imgHeight - bgH - margin;
      return { bgX, bgY, bgW, bgH, fontSize, textX: bgX + padX, textY: bgY + bgH / 2 };
    }
    window._calcWatermarkLayout = _calcWatermarkLayout;

    // 商品グループ別のウォーターマーク位置
    const WATERMARK_POSITION = {
      "t-shirt":          "bottom-right",
      "sticker":          "bottom-right",
      "can-badge":        "bottom-center",
      "acrylic-keychain": "bottom-center",
    };
    const RIGHT_SLUGS  = ["t-shirt", "sticker"];
    const CENTER_SLUGS = ["can-badge", "acrylic-keychain"];

    function applyWatermark(imageData, mimeType, position = "bottom-right") {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width  = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);

          const text     = "© nyanmusu";
          ctx.font       = `12px sans-serif`; // measureText用（仮）
          const textW    = ctx.measureText(text).width;
          const { bgX, bgY, bgW, bgH, fontSize, textX, textY } =
            _calcWatermarkLayout(img.width, img.height, textW, position);
          ctx.font = `${fontSize}px sans-serif`;

          ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
          ctx.beginPath();
          ctx.roundRect(bgX, bgY, bgW, bgH, 4);
          ctx.fill();

          ctx.fillStyle    = "rgba(255, 255, 255, 0.9)";
          ctx.textBaseline = "middle";
          ctx.fillText(text, textX, textY);

          // data URL → base64部分のみ取り出す
          const dataUrl   = canvas.toDataURL("image/jpeg", 0.92);
          const base64    = dataUrl.split(",")[1];
          resolve({ imageData: base64, mimeType: "image/jpeg" });
        };
        img.src = `data:${mimeType};base64,${imageData}`;
      });
    }

    /**
     * fal.ai 失敗時のフォールバック用に画像を 2048px にリサイズする。
     * Canvas の imageSmoothingQuality:"high" を使用（Chrome: Lanczos、Firefox/Safari: bicubic）。
     * 元画像がすでに maxSide 以上の場合はリサイズせずそのまま返す。
     * ※ fal.ai 投入用の imageData(1024px) とは別フィールド（hiresImageData）として送る。
     *   2048px を fal.ai に入力すると ESRGAN 2x で 4096px ≈ 24MB → SUZURI 20MB 超過のため。
     */
    function resizeForSuzuri(imageData, mimeType, maxSide = 2048) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(maxSide / img.width, maxSide / img.height);
          if (scale <= 1) {
            // 既に目標サイズ以上 → リサイズ不要
            resolve({ imageData, mimeType });
            return;
          }
          const w = Math.round(img.width  * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width  = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high"; // Chrome: Lanczos / Firefox・Safari: bicubic
          ctx.drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
          resolve({ imageData: dataUrl.split(",")[1], mimeType: "image/jpeg" });
        };
        img.src = `data:${mimeType};base64,${imageData}`;
      });
    }

    // ----------------------------------------------------------
    async function startGenerate() {
      if (!researchData) return;
      if (isRateLimited()) {
        document.getElementById("g-error-text").textContent = getRateLimitMessage();
        showGenerate("error");
        return;
      }
      lastImageUrl = null;
      document.getElementById("g-goods").classList.add("hidden");

      try {
        const data = await apiFetch("/generate", {
          theme: researchData.theme,
          description: researchData.description,
          foodItem: researchData.foodItem ?? null,
        });

        console.log("[generate] source:", data.source);

        if (!data.imageData) throw new Error(t("noImageError"));
        const displayUrl = `data:${data.mimeType};base64,${data.imageData}`;

        const imgEl = document.getElementById("g-image");
        await new Promise((resolve, reject) => {
          imgEl.onload = resolve;
          imgEl.onerror = reject;
          imgEl.src = displayUrl;
        }).catch(() => {
          throw new Error(t("imageLoadError"));
        });
        lastImageUrl = displayUrl;
        document.getElementById("g-result-label").textContent = researchData.theme ?? "";
        const descEl = document.getElementById("g-result-description");
        descEl.textContent = researchData.description ?? "";
        if (researchData.sourceUrl) {
          descEl.href = researchData.sourceUrl;
          descEl.classList.add("underline");
        } else {
          descEl.removeAttribute("href");
          descEl.classList.remove("underline");
        }
        // URL を共有可能な ?id= 形式に更新（R2保存成功時のみ）
        if (data.id) {
          currentSharedId = data.id;
          history.replaceState(null, "", "?id=" + data.id);
        }

        showGenerate("result");

        // ウォーターマーク合成 → SUZURI登録
        createSuzuriFromImage(data.imageData, data.mimeType, researchData.theme, data.id ?? null);

      } catch (err) {
        console.error("[generate] error:", err.message);
        document.getElementById("g-error-text").textContent = err.message;
        showGenerate("error");
      }
    }

    async function shareOrSaveImage() {
      if (!lastImageUrl) return;
      const safeName = (researchData?.theme ?? "cat").replace(/[\\/:*?"<>|]/g, "_");
      const fileName = `anniversary-cat-${safeName}.png`;

      // blob 取得（Pollinations URL はプロキシ経由、data URL は直接 fetch）
      let blob = null;
      try {
        if (lastImageUrl.startsWith("https://")) {
          const proxyUrl = WORKER_URL + "/proxy-image?url=" + encodeURIComponent(lastImageUrl);
          const res = await fetch(proxyUrl);
          if (res.ok) blob = await res.blob();
        } else {
          const res = await fetch(lastImageUrl);
          if (res.ok) blob = await res.blob();
        }
      } catch (e) {
        console.warn("blob fetch failed:", e.message);
      }

      if (!blob) {
        window.open(lastImageUrl, "_blank");
        return;
      }

      // Web Share API with files（iOS Safari / Android Chrome / PC Safari）
      const file = new File([blob], fileName, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          const BASE_URL  = "https://hiroshikuze.github.io/anniversary-cat-worker/";
          const SITE_URL  = currentSharedId ? BASE_URL + "?id=" + currentSharedId : BASE_URL;
          const X_URL_CHARS = 23; // X はURLの実長に関わらず23文字としてカウント
          const X_LIMIT = 280;
          const desc = researchData?.description ?? "";
          const hashtag = currentLang === "ja" ? "\n#にゃんバーサリー" : "\n#Nyaniversary";
          const urlSuffix = "\n" + SITE_URL;
          // X の文字数計算（URLをX換算長に置換して計測）
          const xLen = (s) => s.replace(SITE_URL, "x".repeat(X_URL_CHARS)).length;
          // description → URL → hashtag の優先順で収まる組み合わせを選択
          let shareText;
          if (xLen(desc + hashtag + urlSuffix) <= X_LIMIT) {
            shareText = desc + hashtag + urlSuffix;
          } else if (xLen(desc + urlSuffix) <= X_LIMIT) {
            shareText = desc + urlSuffix;
          } else {
            shareText = desc;
          }
          await navigator.share({
            files: [file],
            title: currentLang === "ja" ? "にゃんバーサリー" : "Nyaniversary",
            text: shareText,
          });
          return;
        } catch (e) {
          if (e.name === "AbortError") return; // ユーザーがキャンセル
          console.warn("share failed, falling back to download:", e.message);
        }
      }

      // fallback: 通常ダウンロード（PC Chrome / Firefox 等）
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = blobUrl;
      a.download = fileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
    }
  </script>
</body>
</html>
