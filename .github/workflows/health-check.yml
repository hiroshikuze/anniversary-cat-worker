name: Health Check

on:
  push:
    branches:
      - main
      - "claude/**"

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Run bot unit tests
        run: node scripts/test-bot.mjs
      - name: Run suzuri unit tests
        run: node scripts/test-suzuri.mjs
      - name: Frontend feature presence check
        run: |
          check() { grep -q "$1" frontend/index.html || { echo "❌ Missing: $1"; exit 1; }; }
          # 英語i18n
          check 'MONTH_NAMES_EN'
          check 'themeEn'
          check 'params.set("lang"'
          # 計測
          check 'gallery-click'
          check 'umami?.track'
          # SUZURI登録フロー
          check 'createSuzuriFromImage'
          check 'allSuzuriProductsRegistered'
          check 'resizeForSuzuri'
          # 画像合成
          check 'applyWatermark'
          check 'generateKanjiTexture'
          # 共有URL・コア機能
          check 'loadSharedImage'
          # かなモード
          check 'lang-btn-kana'
          check 'setLang'
          check 'formatDateKana'
          check 'setErrText'
          echo "✅ All critical frontend features present"
      - name: Run health check
        run: node scripts/health-check.js
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          BLUESKY_IDENTIFIER:     ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD:   ${{ secrets.BLUESKY_APP_PASSWORD }}
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUZURI_API_KEY:         ${{ secrets.SUZURI_API_KEY }}
          MASTODON_INSTANCE_URL:  ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN:  ${{ secrets.MASTODON_ACCESS_TOKEN }}
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKER_URL:             ${{ secrets.WORKER_URL }}
          BYPASS_TOKEN:           ${{ secrets.BYPASS_TOKEN }}
