name = "anniversary-cat-worker"
main = "worker/index.js"
compatibility_date = "2024-01-01"
preview_urls = false

[triggers]
# 月〜金 10:00 UTC（= 19:00 JST）に Bluesky 営業 Bot を実行
# Cloudflare Workers の曜日指定は 1=日曜日 のため、月〜金は 2-6
crons = ["0 10 * * 2-6"]

[vars]
# GitHub Pages の URL を設定（デプロイ後に実際の URL に変更してください）
ALLOWED_ORIGIN = "https://hiroshikuze.github.io"

# GEMINI_API_KEY は以下のコマンドで登録（コードには書かない）:
#   wrangler secret put GEMINI_API_KEY
#
# BYPASS_TOKEN（レート制限をスキップするシークレット）は以下で登録:
#   wrangler secret put BYPASS_TOKEN
#
# Bluesky Bot 用シークレット（以下で登録）:
#   wrangler secret put BLUESKY_IDENTIFIER    （例: nyanmusu.bsky.social）
#   wrangler secret put BLUESKY_APP_PASSWORD  （Bluesky の App Password）
#   wrangler secret put DISCORD_WEBHOOK_URL   （エラー通知用 Discord Webhook URL）

# レート制限用 KV namespace
# 作成コマンド: wrangler kv namespace create RATE_KV
# 作成後、下記の id を出力された ID に書き換えてください
[[kv_namespaces]]
binding = "RATE_KV"
id = "531244f9f904493d93c3a418b9765df8"

[observability]
[observability.logs]
enabled = false
invocation_logs = true
